<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PaySick</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #FF4757 0%, #E01E37 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 440px;
            padding: 48px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .logo-svg {
            width: 64px;
            height: 64px;
        }

        .logo-text {
            font-size: 32px;
            font-weight: 400;
            color: #1A1A1A;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            font-weight: 300;
            color: #4A4A4A;
        }

        .logo p {
            color: #8A8A8A;
            font-size: 14px;
            margin-top: -8px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            color: #1A1A1A;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E5E5E5;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #FF4757;
            box-shadow: 0 0 0 4px rgba(255, 71, 87, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #FF4757 0%, #E01E37 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 32px 0;
            position: relative;
            color: #8A8A8A;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #E5E5E5;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .demo-credentials {
            background: #FAFAFA;
            border-radius: 8px;
            padding: 16px;
            margin-top: 24px;
        }

        .demo-credentials h3 {
            color: #1A1A1A;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .demo-credentials p {
            color: #4A4A4A;
            font-size: 13px;
            margin-bottom: 8px;
            font-family: 'Courier New', monospace;
        }

        .demo-credentials strong {
            color: #FF4757;
        }

        .back-home {
            text-align: center;
            margin-top: 24px;
        }

        .back-home a {
            color: #FF4757;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }

        .back-home a:hover {
            opacity: 0.8;
        }

        .register-cta {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #8A8A8A;
        }

        .register-cta a {
            color: #FF4757;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }

        .register-cta a:hover {
            opacity: 0.8;
        }

        .error-message {
            background: #FFE5E8;
            color: #E01E37;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @media (max-width: 768px) {
            .login-container {
                padding: 32px 24px;
            }

            .logo h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="loginCrossGradient" cx="40%" cy="40%">
                        <stop offset="0%" style="stop-color:#FF4757;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#E01E37;stop-opacity:1" />
                    </radialGradient>
                    <radialGradient id="loginBgCircle" cx="50%" cy="50%">
                        <stop offset="0%" style="stop-color:#FF4757;stop-opacity:0.12" />
                        <stop offset="100%" style="stop-color:#FF4757;stop-opacity:0.04" />
                    </radialGradient>
                </defs>
                <circle cx="50" cy="50" r="40" fill="url(#loginBgCircle)"/>
                <rect x="44" y="20" width="12" height="60" rx="6" fill="url(#loginCrossGradient)"/>
                <rect x="20" y="44" width="60" height="12" rx="6" fill="url(#loginCrossGradient)"/>
                <circle cx="50" cy="50" r="8" fill="#ffffff"/>
                <circle cx="50" cy="50" r="6" fill="#E01E37"/>
            </svg>
            <div class="logo-text">Pay<span>Sick</span></div>
            <p>Healthcare payments made simple</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="role">Login As</label>
                <select id="role" required>
                    <option value="user">Patient / User</option>
                    <option value="provider">Healthcare Provider</option>
                    <option value="lender">Lender</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn">Sign In</button>
        </form>

        <div class="divider">Demo Access</div>

        <div class="demo-credentials">
            <h3>Demo Credentials</h3>
            <p><strong>Patient:</strong> user@paysick.com / password123</p>
            <p><strong>Provider:</strong> provider@paysick.com / provider123</p>
            <p><strong>Lender:</strong> lender@paysick.com / lender123</p>
            <p><strong>Admin:</strong> admin@paysick.com / admin123</p>
        </div>

        <div class="register-cta">
            New to PaySick? <a href="register.html">Create an account</a>
        </div>

        <div class="back-home">
            <a href="index.html"><svg style="width:16px;height:16px;vertical-align:middle;margin-right:4px;" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke="#FF4757" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" d="M19 12H5M12 19l-7-7 7-7"/></svg>Back to Home</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const errorMessage = document.getElementById('errorMessage');
            const submitBtn = this.querySelector('button[type="submit"]');

            // Disable button during request
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';

            try {
                // Call the real API for authentication
                const response = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && (data.accessToken || data.token)) {
                    // Store real JWT token and user data
                    localStorage.setItem('paysick_auth_token', data.accessToken || data.token);
                    localStorage.setItem('paysick_user', JSON.stringify({
                        ...data.user,
                        role: role,
                        name: data.user.full_name
                    }));

                    // Redirect to appropriate page based on role
                    switch (role) {
                        case 'admin':
                            window.location.href = 'admin-dashboard.html';
                            break;
                        case 'provider':
                            window.location.href = 'dashboard.html'; // Provider dashboard coming soon
                            break;
                        case 'lender':
                            window.location.href = 'lender-dashboard.html';
                            break;
                        default:
                            const onboardingComplete = localStorage.getItem('paysick_onboarding_complete');
                            if (onboardingComplete === 'true') {
                                window.location.href = 'dashboard.html';
                            } else {
                                window.location.href = 'onboarding.html';
                            }
                    }
                } else {
                    // API login failed - try demo login endpoint
                    console.warn('API login failed, trying demo login:', data.error);

                    // Try the demo login endpoint which creates a real JWT
                    const demoResponse = await fetch('/api/users/demo-login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email, role })
                    });

                    const demoData = await demoResponse.json();

                    if (demoResponse.ok && (demoData.accessToken || demoData.token)) {
                        // Store token — API returns accessToken; fall back to token for safety
                        localStorage.setItem('paysick_auth_token', demoData.accessToken || demoData.token);
                        localStorage.setItem('paysick_user', JSON.stringify({
                            ...demoData.user,
                            name: demoData.user.full_name
                        }));

                        // Redirect to appropriate page based on role
                        switch (role) {
                            case 'admin':
                                window.location.href = 'admin-dashboard.html';
                                break;
                            case 'provider':
                                // provider-dashboard not yet built; send to main dashboard
                                window.location.href = 'dashboard.html';
                                break;
                            case 'lender':
                                window.location.href = 'lender-dashboard.html';
                                break;
                            default:
                                const onboardingComplete = localStorage.getItem('paysick_onboarding_complete');
                                if (onboardingComplete === 'true') {
                                    window.location.href = 'dashboard.html';
                                } else {
                                    window.location.href = 'onboarding.html';
                                }
                        }
                    } else {
                        throw new Error(demoData.error || 'Invalid credentials');
                    }
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = error.message || 'Login failed. Please try again.';
                errorMessage.classList.add('show');

                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 3000);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
