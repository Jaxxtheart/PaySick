<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PaySick</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #FF4757 0%, #E01E37 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 440px;
            padding: 48px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .logo-svg {
            width: 64px;
            height: 64px;
        }

        .logo-text {
            font-size: 32px;
            font-weight: 400;
            color: #1A1A1A;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            font-weight: 300;
            color: #4A4A4A;
        }

        .logo p {
            color: #8A8A8A;
            font-size: 14px;
            margin-top: -8px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            color: #1A1A1A;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E5E5E5;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #FF4757;
            box-shadow: 0 0 0 4px rgba(255, 71, 87, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #FF4757 0%, #E01E37 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #FF4757;
            cursor: pointer;
        }

        .remember-me label {
            font-size: 14px;
            font-weight: 400;
            color: #4A4A4A;
            margin-bottom: 0;
            cursor: pointer;
        }

        .back-home {
            text-align: center;
            margin-top: 24px;
        }

        .back-home a {
            color: #FF4757;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }

        .back-home a:hover {
            opacity: 0.8;
        }

        .register-cta {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #8A8A8A;
        }

        .register-cta a {
            color: #FF4757;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }

        .register-cta a:hover {
            opacity: 0.8;
        }

        .error-message {
            background: #FFE5E8;
            color: #E01E37;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @media (max-width: 768px) {
            .login-container {
                padding: 32px 24px;
            }

            .logo h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="loginCrossGradient" cx="40%" cy="40%">
                        <stop offset="0%" style="stop-color:#FF4757;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#E01E37;stop-opacity:1" />
                    </radialGradient>
                    <radialGradient id="loginBgCircle" cx="50%" cy="50%">
                        <stop offset="0%" style="stop-color:#FF4757;stop-opacity:0.12" />
                        <stop offset="100%" style="stop-color:#FF4757;stop-opacity:0.04" />
                    </radialGradient>
                </defs>
                <circle cx="50" cy="50" r="40" fill="url(#loginBgCircle)"/>
                <rect x="44" y="20" width="12" height="60" rx="6" fill="url(#loginCrossGradient)"/>
                <rect x="20" y="44" width="60" height="12" rx="6" fill="url(#loginCrossGradient)"/>
                <circle cx="50" cy="50" r="8" fill="#ffffff"/>
                <circle cx="50" cy="50" r="6" fill="#E01E37"/>
            </svg>
            <div class="logo-text">Pay<span>Sick</span></div>
            <p>Healthcare payments made simple</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="role">Login As</label>
                <select id="role" required>
                    <option value="user">Patient / User</option>
                    <option value="provider">Healthcare Provider</option>
                    <option value="lender">Lender</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" autocomplete="current-password" placeholder="Enter your password" required>
            </div>

            <div class="remember-me">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Remember me</label>
            </div>

            <button type="submit" class="btn">Sign In</button>
        </form>

        <div class="register-cta">
            New to PaySick? <a href="register.html">Create an account</a>
        </div>

        <div class="back-home">
            <a href="index.html"><svg style="width:16px;height:16px;vertical-align:middle;margin-right:4px;" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke="#FF4757" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" d="M19 12H5M12 19l-7-7 7-7"/></svg>Back to Home</a>
            <br><a href="demo-login.html" style="color: #D0D0D0; font-size: 11px; text-decoration: none; margin-top: 16px; display: inline-block;">Demo</a>
        </div>

        <div style="text-align:center;margin-top:32px;">
            <a href="demo-login.html" style="font-size:11px;color:#D0D0D0;text-decoration:none;" tabindex="-1">Demo access</a>
        </div>
    </div>

    <script>
        function redirectByRole(role) {
            switch (role) {
                case 'admin':
                    window.location.href = 'admin-dashboard.html';
                    break;
                case 'provider':
                    window.location.href = 'dashboard.html';
                    break;
                case 'lender':
                    window.location.href = 'lender-dashboard.html';
                    break;
                default:
                    const onboardingComplete = localStorage.getItem('paysick_onboarding_complete');
                    window.location.href = onboardingComplete === 'true' ? 'dashboard.html' : 'onboarding.html';
            }
        }

        // Attempt auto-login via stored refresh token (Remember Me)
        (async function attemptAutoLogin() {
            try {
                const saved = localStorage.getItem('paysick_remember');
                if (!saved) return;

                const { refreshToken, email, role } = JSON.parse(saved);
                if (!refreshToken) {
                    // Clear legacy data (old format stored passwords)
                    localStorage.removeItem('paysick_remember');
                    return;
                }

                // Prepopulate email and role while we attempt auto-login
                if (email) document.getElementById('email').value = email;
                if (role) document.getElementById('role').value = role;
                document.getElementById('rememberMe').checked = true;

                // Try to get a new access token using the refresh token
                const response = await fetch('/api/users/refresh-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refreshToken })
                });

                if (!response.ok) {
                    // Refresh token expired or revoked — clear and show login form
                    localStorage.removeItem('paysick_remember');
                    return;
                }

                const tokens = await response.json();
                localStorage.setItem('paysick_auth_token', tokens.accessToken);

                // Fetch user profile with the new access token
                const profileRes = await fetch('/api/users/profile', {
                    headers: { 'Authorization': 'Bearer ' + tokens.accessToken }
                });

                if (profileRes.ok) {
                    const profileData = await profileRes.json();
                    const user = profileData.user || profileData;
                    localStorage.setItem('paysick_user', JSON.stringify({
                        ...user,
                        name: user.full_name
                    }));
                    redirectByRole(user.role || role);
                } else {
                    // Profile fetch failed — let user log in manually
                    localStorage.removeItem('paysick_remember');
                }
            } catch (e) {
                // Network error or parse error — clear stale data
                localStorage.removeItem('paysick_remember');
            }
        })();

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorMessage = document.getElementById('errorMessage');
            const submitBtn = this.querySelector('button[type="submit"]');

            if (!email || !password) {
                errorMessage.textContent = 'Please enter your email and password.';
                errorMessage.classList.add('show');
                setTimeout(() => errorMessage.classList.remove('show'), 3000);
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';

            try {
                const response = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, rememberMe })
                });

                const data = await response.json();

                if (response.ok && data.accessToken) {
                    // Handle Remember Me — store refresh token, never the password
                    if (rememberMe && data.refreshToken) {
                        localStorage.setItem('paysick_remember', JSON.stringify({
                            refreshToken: data.refreshToken,
                            email: email,
                            role: data.user.role || role
                        }));
                    } else {
                        localStorage.removeItem('paysick_remember');
                    }

                    localStorage.setItem('paysick_auth_token', data.accessToken);
                    localStorage.setItem('paysick_user', JSON.stringify({
                        ...data.user,
                        role: data.user.role || role,
                        name: data.user.full_name
                    }));

                    redirectByRole(data.user.role || role);
                } else if (response.status === 403 && data.code === 'EMAIL_UNVERIFIED') {
                    // Unverified account — redirect to verification page
                    errorMessage.textContent = 'Please verify your email address first.';
                    errorMessage.classList.add('show');
                    setTimeout(() => {
                        window.location.href = `verify-email.html?email=${encodeURIComponent(data.email || email)}`;
                    }, 1800);
                    return;
                } else {
                    throw new Error(data.error || data.message || 'Invalid email or password.');
                }
            } catch (error) {
                errorMessage.textContent = error.message || 'Login failed. Please try again.';
                errorMessage.classList.add('show');
                setTimeout(() => errorMessage.classList.remove('show'), 4000);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
