<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - PaySick</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #FF4757 0%, #E01E37 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 440px;
            padding: 48px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .logo-svg {
            width: 64px;
            height: 64px;
        }

        .logo-text {
            font-size: 32px;
            font-weight: 400;
            color: #1A1A1A;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            font-weight: 300;
            color: #4A4A4A;
        }

        .logo p {
            color: #8A8A8A;
            font-size: 14px;
            margin-top: -8px;
        }

        h2 {
            font-size: 20px;
            font-weight: 700;
            color: #1A1A1A;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #6A6A6A;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            color: #1A1A1A;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E5E5E5;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #FF4757;
            box-shadow: 0 0 0 4px rgba(255, 71, 87, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #FF4757 0%, #E01E37 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-message {
            background: #FFE5E8;
            color: #E01E37;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        .success-message {
            background: #E8F5E9;
            color: #2E7D32;
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            display: none;
            text-align: center;
        }

        .success-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%       { transform: translateX(-10px); }
            75%       { transform: translateX(10px); }
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            color: #FF4757;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }

        .back-link a:hover {
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            body {
                padding: 16px;
                align-items: flex-start;
                padding-top: 32px;
            }

            .card {
                padding: 32px 24px;
                border-radius: 12px;
            }

            .logo-text {
                font-size: 26px;
            }

            .logo-svg {
                width: 52px;
                height: 52px;
            }

            input {
                padding: 13px 14px;
                font-size: 16px; /* prevent iOS zoom on focus */
            }

            .btn {
                padding: 15px;
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
                padding-top: 24px;
            }

            .card {
                padding: 28px 18px;
            }

            .logo {
                margin-bottom: 24px;
                gap: 12px;
            }

            .logo-svg {
                width: 44px;
                height: 44px;
            }

            .logo-text {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="crossGradient" cx="40%" cy="40%">
                        <stop offset="0%" style="stop-color:#FF4757;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#E01E37;stop-opacity:1" />
                    </radialGradient>
                    <radialGradient id="bgCircle" cx="50%" cy="50%">
                        <stop offset="0%" style="stop-color:#FF4757;stop-opacity:0.12" />
                        <stop offset="100%" style="stop-color:#FF4757;stop-opacity:0.04" />
                    </radialGradient>
                </defs>
                <circle cx="50" cy="50" r="40" fill="url(#bgCircle)"/>
                <rect x="44" y="20" width="12" height="60" rx="6" fill="url(#crossGradient)"/>
                <rect x="20" y="44" width="60" height="12" rx="6" fill="url(#crossGradient)"/>
                <circle cx="50" cy="50" r="8" fill="#ffffff"/>
                <circle cx="50" cy="50" r="6" fill="#E01E37"/>
            </svg>
            <div class="logo-text">Pay<span>Sick</span></div>
            <p>Healthcare payments made simple</p>
        </div>

        <h2>Forgot your password?</h2>
        <p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="forgotForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
            </div>

            <button type="submit" class="btn" id="submitBtn">Send Reset Link</button>
        </form>

        <div class="back-link">
            <a href="login.html">
                <svg style="width:16px;height:16px;vertical-align:middle;margin-right:4px;" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke="#FF4757" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>Back to Login
            </a>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const submitBtn = document.getElementById('submitBtn');

            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');

            if (!email) {
                errorMessage.textContent = 'Please enter your email address.';
                errorMessage.classList.add('show');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                const response = await fetch('/api/users/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                let data;
                try {
                    data = await response.json();
                } catch {
                    errorMessage.textContent = `Server error (${response.status}). Please try again shortly.`;
                    errorMessage.classList.add('show');
                    return;
                }

                if (response.ok) {
                    // Always show generic success — never reveal whether the email exists
                    document.getElementById('forgotForm').style.display = 'none';
                    successMessage.textContent = data.message || 'If an account with that email exists, a reset link has been sent. Please check your inbox.';
                    successMessage.classList.add('show');
                } else {
                    errorMessage.textContent = data.error || data.message || 'Something went wrong. Please try again.';
                    errorMessage.classList.add('show');
                }
            } catch (error) {
                errorMessage.textContent = 'Unable to connect. Please check your connection and try again.';
                errorMessage.classList.add('show');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>
</html>
