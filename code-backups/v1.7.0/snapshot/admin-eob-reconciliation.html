<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <title>EOB Reconciliation — PaySick Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #F4F6F9; color: #1B2A4A; }

    .header { background: #1B2A4A; color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .logo { font-size: 22px; font-weight: 700; color: #EF476F; text-decoration: none; }
    .page-title { font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.9); }
    .admin-badge { background: #EF476F; color: white; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
    .logout-btn { background: transparent; border: 2px solid rgba(255,255,255,0.4); color: white; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .logout-btn:hover { border-color: #EF476F; color: #EF476F; }

    .main { max-width: 1400px; margin: 0 auto; padding: 24px; }

    .filters { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; box-shadow: 0 2px 8px rgba(27,42,74,0.06); }
    .filter-group { display: flex; flex-direction: column; gap: 6px; }
    .filter-group label { font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; }
    .filter-group select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; min-width: 160px; }
    .filter-btn { padding: 9px 20px; background: #1B2A4A; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
    .filter-btn:hover { background: #EF476F; }

    .table-container { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(27,42,74,0.06); overflow: hidden; }
    .table-header { padding: 20px 24px; border-bottom: 1px solid #E5E5E5; display: flex; justify-content: space-between; align-items: center; }
    .table-header h2 { font-size: 16px; font-weight: 700; }
    .count-badge { background: #F4F6F9; color: #666; padding: 4px 12px; border-radius: 20px; font-size: 13px; }

    table { width: 100%; border-collapse: collapse; }
    thead th { background: #F4F6F9; padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
    tbody tr { border-bottom: 1px solid #F0F0F0; transition: background 0.15s; }
    tbody tr:hover { background: #F9FAFB; }
    tbody td { padding: 14px 16px; font-size: 14px; }

    .amount { font-weight: 600; color: #1B2A4A; }
    .variance-positive { color: #EF476F; font-weight: 700; }
    .variance-negative { color: #10B981; font-weight: 700; }

    .status-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
    .status-PENDING { background: #FEF3C7; color: #92400E; }
    .status-RECONCILED { background: #DCFCE7; color: #166534; }

    .btn-reconcile { padding: 6px 14px; background: #EF476F; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 700; }
    .btn-reconcile:hover { background: #D63E5F; }
    .btn-reconcile:disabled { background: #ccc; cursor: not-allowed; }

    .loading { text-align: center; padding: 48px; color: #666; }
    .error-msg { text-align: center; padding: 48px; color: #EF476F; }

    .summary-row { background: #F4F6F9; padding: 16px 24px; display: flex; gap: 32px; border-bottom: 1px solid #E5E5E5; }
    .summary-item .label { font-size: 12px; color: #666; text-transform: uppercase; font-weight: 600; }
    .summary-item .value { font-size: 20px; font-weight: 700; color: #1B2A4A; margin-top: 2px; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <a href="/admin-dashboard.html" class="logo">PaySick</a>
    <span class="page-title">EOB Reconciliation</span>
    <span class="admin-badge">Admin</span>
  </div>
  <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
</header>

<main class="main">
  <div class="filters">
    <div class="filter-group">
      <label>Status</label>
      <select id="filterStatus">
        <option value="PENDING">Pending Reconciliation</option>
        <option value="RECONCILED">Already Reconciled</option>
      </select>
    </div>
    <button class="filter-btn" onclick="loadSubmissions()">Apply</button>
  </div>

  <div class="table-container">
    <div id="summaryRow" class="summary-row" style="display:none">
      <div class="summary-item">
        <div class="label">Pending EOBs</div>
        <div class="value" id="sumPending">—</div>
      </div>
      <div class="summary-item">
        <div class="label">Total Invoice Value</div>
        <div class="value" id="sumInvoice">—</div>
      </div>
      <div class="summary-item">
        <div class="label">Facilitation Ceiling Total</div>
        <div class="value" id="sumCeiling">—</div>
      </div>
    </div>
    <div class="table-header">
      <h2>EOB Submissions</h2>
      <span class="count-badge" id="totalCount">Loading...</span>
    </div>
    <div id="tableContent">
      <div class="loading">Loading EOB submissions...</div>
    </div>
  </div>
</main>

<script>
  function getToken() {
    return localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
  }

  async function apiFetch(path, options = {}) {
    const token = getToken();
    const headers = { 'Content-Type': 'application/json', ...(token ? { 'Authorization': `Bearer ${token}` } : {}), ...options.headers };
    return fetch(path, { ...options, headers });
  }

  function formatZAR(val) {
    if (val === null || val === undefined) return '—';
    return `R ${parseFloat(val).toLocaleString('en-ZA', { minimumFractionDigits: 2 })}`;
  }

  function formatVariance(invoice, ceiling) {
    if (!invoice || !ceiling) return '—';
    const variance = ((parseFloat(invoice) - parseFloat(ceiling)) / parseFloat(ceiling) * 100).toFixed(1);
    const cls = parseFloat(variance) > 0 ? 'variance-positive' : 'variance-negative';
    return `<span class="${cls}">${variance > 0 ? '+' : ''}${variance}%</span>`;
  }

  async function loadSubmissions() {
    document.getElementById('tableContent').innerHTML = '<div class="loading">Loading...</div>';
    const status = document.getElementById('filterStatus').value;
    const url = `/api/admin/eob-reconciliation?status=${status}&limit=100`;

    try {
      const res = await apiFetch(url);
      if (res.status === 401) { window.location.href = '/login.html'; return; }
      if (!res.ok) throw new Error('Request failed');
      const data = await res.json();
      const items = data.submissions || [];

      document.getElementById('totalCount').textContent = `${data.total || 0} submissions`;

      if (status === 'PENDING' && items.length > 0) {
        const totalInvoice = items.reduce((s, i) => s + parseFloat(i.provider_invoice_amount || 0), 0);
        const totalCeiling = items.reduce((s, i) => s + parseFloat(i.facilitation_ceiling || 0), 0);
        document.getElementById('sumPending').textContent = items.length;
        document.getElementById('sumInvoice').textContent = formatZAR(totalInvoice);
        document.getElementById('sumCeiling').textContent = formatZAR(totalCeiling);
        document.getElementById('summaryRow').style.display = 'flex';
      } else {
        document.getElementById('summaryRow').style.display = 'none';
      }

      if (items.length === 0) {
        document.getElementById('tableContent').innerHTML = '<div class="loading">No EOB submissions found.</div>';
        return;
      }

      const rows = items.map(item => `
        <tr>
          <td>${item.id}</td>
          <td style="font-family:monospace;font-size:12px">${(item.application_id || '').slice(0,8)}...</td>
          <td class="amount">${formatZAR(item.provider_invoice_amount)}</td>
          <td class="amount">${formatZAR(item.facilitation_ceiling)}</td>
          <td>${formatVariance(item.provider_invoice_amount, item.facilitation_ceiling)}</td>
          <td class="amount">${formatZAR(item.scheme_residual_amount)}</td>
          <td><span class="status-badge status-${item.reconciliation_status}">${item.reconciliation_status}</span></td>
          <td>${item.submitted_at ? new Date(item.submitted_at).toLocaleDateString('en-ZA') : '—'}</td>
          <td>
            ${item.reconciliation_status === 'PENDING'
              ? `<button class="btn-reconcile" onclick="reconcileEob('${item.application_id}', this)">Reconcile</button>`
              : '<span style="color:#10B981;font-weight:600">Reconciled</span>'
            }
          </td>
        </tr>
      `).join('');

      document.getElementById('tableContent').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Application</th><th>Invoice Amount</th><th>Ceiling</th>
              <th>Variance vs Ceiling</th><th>Scheme Residual</th><th>Status</th><th>Submitted</th><th>Action</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    } catch (err) {
      document.getElementById('tableContent').innerHTML = `<div class="error-msg">Failed to load: ${err.message}</div>`;
    }
  }

  async function reconcileEob(applicationId, btn) {
    if (!confirm(`Reconcile EOB for application ${applicationId.slice(0,8)}...? This will trigger the final payout calculation.`)) return;
    btn.disabled = true;
    btn.textContent = 'Processing...';
    try {
      const res = await apiFetch('/api/v1/payouts/reconcile', {
        method: 'POST',
        body: JSON.stringify({ application_id: applicationId })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Reconciliation failed');
      alert(`Reconciliation complete.\nFinal payout: R ${data.final_payout_amount?.toLocaleString('en-ZA', { minimumFractionDigits: 2 })}\n${data.excess_withheld > 0 ? `Excess withheld: R ${data.excess_withheld.toLocaleString('en-ZA', { minimumFractionDigits: 2 })}` : 'No excess withheld.'}`);
      loadSubmissions();
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Reconcile';
      alert('Reconciliation failed: ' + err.message);
    }
  }

  function handleLogout() {
    localStorage.removeItem('auth_token');
    sessionStorage.removeItem('auth_token');
    window.location.href = '/login.html';
  }

  loadSubmissions();
</script>
</body>
</html>
